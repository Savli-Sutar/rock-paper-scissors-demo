<!DOCTYPE html>
<html>
  <head>
    <meta charset ="UTF-8"/>
    <title>Rock,Paper,Scissors,Shoot!</title>
    <link rel="stylesheet" href="index.css"/>
  </head>
  <body>
    <div class="game-container">
  <h1>Rock, Paper, Scissors</h1>
  
  <div class="choices">
    <button id="rock" class="choice-btn">Rock 🪨</button>
    <button id="paper" class="choice-btn">Paper 📄</button>
    <button id="scissors" class="choice-btn">Scissors ✂️</button>
  </div>

  <div class="results">
    <p id="user-display">User Choice: </p>
    <p id="computer-display">Computer Choice: </p>
    <h2 id="winner-text">Who will win?</h2>
  </div>
</div>

  </body>
</html>
